<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Edit TODO</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<style>
		.edit-form {
			background: #f8f9fa;
			padding: 20px;
			border-radius: 5px;
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			color: #333;
			font-weight: 500;
		}

		.form-group input,
		.form-group textarea {
			width: 100%;
			padding: 10px;
			border: 2px solid #ddd;
			border-radius: 5px;
			font-size: 1em;
			font-family: inherit;
		}

		.form-group input:focus,
		.form-group textarea:focus {
			outline: none;
			border-color: #667eea;
		}

		.form-group textarea {
			resize: vertical;
			min-height: 100px;
		}

		.form-actions {
			display: flex;
			gap: 10px;
			justify-content: center;
		}

		.btn-save {
			background: #4CAF50;
			color: white;
			padding: 12px 30px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			font-size: 1em;
			font-weight: bold;
			transition: background 0.3s;
		}

		.btn-save:hover {
			background: #45a049;
		}

		.btn-cancel {
			background: #999;
			color: white;
			padding: 12px 30px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			font-size: 1em;
			font-weight: bold;
			transition: background 0.3s;
			text-decoration: none;
			display: inline-block;
		}

		.btn-cancel:hover {
			background: #777;
		}

		.checkbox-group {
			display: flex;
			align-items: center;
		}

		.checkbox-group input[type="checkbox"] {
			width: auto;
			margin-right: 10px;
			accent-color: #667eea;
		}

		.checkbox-group label {
			margin: 0;
			display: inline;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>✏️ Edit TODO</h1>

		<form class="edit-form" th:action="@{/update/{id}(id=${todo.id})}" method="post">
			<div class="form-group">
				<label for="title">Title *</label>
				<input type="text" id="title" name="title" th:value="${todo.title}" required>
			</div>

			<div class="form-group">
				<label for="description">Description</label>
				<textarea id="description" name="description" th:text="${todo.description}"></textarea>
			</div>

			<div class="form-group checkbox-group">
				<input type="checkbox" id="completed" name="completed" th:checked="${todo.completed}">
				<label for="completed">Mark as completed</label>
			</div>

			<div class="form-actions">
				<button type="submit" class="btn-save">Save Changes</button>
				<a href="/" class="btn-cancel">Cancel</a>
			</div>
		</form>
	</div>
</body>
</html>
